name: RNS Screener

on:
  # Two schedules 1 hour apart, both Mon-Fri, as a hedge against GitHub
  # sometimes delaying scheduled runs by hours. The "already run today?"
  # guard below (not a fixed hour check) makes sure only the first trigger
  # to actually fire each day runs the pipeline - the second is a no-op if
  # the first already succeeded, whenever in the day that was.
  schedule:
    - cron: "30 6 * * 1-5"
    - cron: "30 7 * * 1-5"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed to commit the "last run" marker back to the repo

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if already run today
        id: guard
        run: |
          TODAY=$(TZ='Europe/London' date +%Y-%m-%d)
          LAST_RUN=$(cat last_run_date.txt 2>/dev/null || echo "")
          echo "UK date today: $TODAY, last recorded run: $LAST_RUN"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$TODAY" != "$LAST_RUN" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Already ran today ($TODAY) - skipping to avoid sending a duplicate digest."
          fi
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.guard.outputs.proceed == 'true'
        run: pip install -r requirements.txt

      - name: Run screener
        if: steps.guard.outputs.proceed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python screener.py

      - name: Record run date
        if: steps.guard.outputs.proceed == 'true'
        run: |
          echo "${{ steps.guard.outputs.today }}" > last_run_date.txt
          git config user.name "rns-screener-bot"
          git config user.email "actions@users.noreply.github.com"
          git add last_run_date.txt
          git commit -m "Record run for ${{ steps.guard.outputs.today }}" || echo "Nothing to commit"
          git push
